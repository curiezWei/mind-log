<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>博客列表页</title>

    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/list.css">

</head>
<body>
    <div class="nav">
        <img src="pic/logo2.jpg" alt="">
        <span class="blog-title">mindlog<br>博客系统</span>
        <div class="space"></div>
        <div id="nav-user">
            <span class="nav-username">curiez</span>
        </div>
        <a class="nav-span" href="blog_list.html">主页</a>
        <a class="nav-span" id="nav-edit" href="blog_edit.html">写博客</a>
        <a class="nav-span" id="nav-logout" href="#" onclick="logout()">注销</a>
    </div>

    <div class="container">
        <div class="left"></div>
        <div class="right">

        </div>
    </div>
    <script src="js/jquery.min.js"></script>
    <script src="js/common.js"></script>
    <script src="blog-editormd/lib/marked.min.js"></script>
    <script>

        var isGuest = localStorage.getItem("isGuest") === "true";

        if (isGuest) {
            $("#nav-edit").hide();
            $("#nav-logout").text("退出游客模式");
            $("#nav-logout").attr("href", "#");
            $("#nav-logout").attr("onclick", "exitGuest()");
        }

        function exitGuest() {
            localStorage.removeItem("user_token");
            localStorage.removeItem("isGuest");
            location.href = "blog_login.html";
        }

        $.ajax({
            type:"get",
            url:"blog/getList",
            success:function (result) {
                if(result.code=="SUCCESS") {
                    var blogs = result.data;
                    var finalHtml = "";
                    for(var i = 0; i < blogs.length; i++) {
                        var blog = blogs[i];
                        finalHtml+='<div class="blog">';
                        finalHtml+='    <span class="author">'+blog.authorName+'</span>';
                        finalHtml+='    <div class="title">'+blog.title+'</div>';
                        finalHtml+='    <div class="date">'+blog.createTime+'</div>';
                        finalHtml+='    <div class="desc" id="desc-'+i+'"></div>';
                        finalHtml+='    <a class="detail" href="blog_detail.html?blogId='+blog.id+'">查看全文&gt;&gt;</a>';
                        finalHtml+='</div>';
                    }

                    $(".container .right").html(finalHtml);

                    for(var i = 0; i < blogs.length; i++) {
                        document.getElementById('desc-'+i).innerHTML = marked.parse(blogs[i].content);
                    }
                }
            }
        })

        $.ajax({
            type: "get",
            url: "user/getUserInfo",
            success:function (result) {
                if(result.code=="SUCCESS"&&result.data != null) {
                    var userInfo = result.data;
                    $("#nav-user .nav-username").text(userInfo.userName);
                }
            }
        })
    </script>
</body>
</html>
